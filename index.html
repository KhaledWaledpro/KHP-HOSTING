<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHP Video Cloud - استضافة خالد وليد</title>
    <style>
        /* إعدادات الألوان البرشلونية (Blaugrana) */
        :root {
            --barca-red: #a50044;
            --barca-blue: #004d98;
            --barca-gold: #edbb00;
            --dark-bg: #050a14;
            --card-bg: #0f172a;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding-bottom: 50px;
            text-align: center;
        }

        /* الهيدر */
        header {
            background: linear-gradient(90deg, var(--barca-red), var(--barca-blue));
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border-bottom: 3px solid var(--barca-gold);
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }

        /* كارت الرفع */
        .upload-card {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { margin: 0; font-size: 28px; font-style: italic; }
        h2 { color: white; margin-bottom: 10px; }
        p { color: #94a3b8; }

        /* منطقة اختيار الملف */
        .drop-zone {
            border: 3px dashed #334155;
            border-radius: 15px;
            padding: 50px;
            margin: 30px 0;
            cursor: pointer;
            transition: all 0.3s;
        }

        .drop-zone:hover {
            border-color: var(--barca-blue);
            background-color: rgba(0, 77, 152, 0.1);
        }

        input[type="file"] { display: none; }

        /* زر الرفع */
        .btn-upload {
            background: linear-gradient(var(--barca-red), var(--barca-blue));
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }

        .btn-upload:active { transform: scale(0.98); }
        .btn-upload:disabled { opacity: 0.5; cursor: not-allowed; }

        /* شريط التحميل */
        .progress-container {
            display: none;
            margin-top: 25px;
        }

        .progress-bar {
            background-color: #1e293b;
            border-radius: 10px;
            height: 15px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            background: var(--barca-gold);
            height: 100%;
            width: 0%;
            transition: width 0.4s;
        }

        /* منطقة كود الـ Embed */
        #resultArea {
            display: none;
            margin-top: 30px;
            background: rgba(0,0,0,0.4);
            padding: 20px;
            border-radius: 15px;
            border-right: 5px solid var(--barca-gold);
            text-align: right;
        }

        textarea {
            width: 100%;
            background: #000;
            color: #4ade80;
            border: 1px solid #334155;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            margin-top: 10px;
            resize: none;
        }

        .copy-btn {
            background-color: var(--barca-gold);
            color: black;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

    </style>
</head>
<body>

    <header>
        <h1>KHP <span style="color: var(--barca-gold);">VIDEO</span> CLOUD</h1>
    </header>

    <div class="container">
        <div class="upload-card">
            <h2>استضافة فيديوهات غير محدودة</h2>
            <p>ارفع فيديوهاتك واحصل على كود التضمين لموقعك فوراً</p>

            <label class="drop-zone" id="dropLabel">
                <input type="file" id="videoInput" accept="video/*">
                <div style="font-size: 40px; margin-bottom: 10px;">🎥</div>
                <div id="fileName">اضغط هنا لاختيار الفيديو</div>
            </label>

            <button id="uploadBtn" class="btn-upload">بدء الرفع الآن</button>

            <div class="progress-container" id="progressArea">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div id="statusText">جاري الرفع... 0%</div>
            </div>

            <div id="resultArea">
                <strong style="color: var(--barca-gold);">✅ تم الرفع بنجاح!</strong>
                <p style="font-size: 14px; margin: 5px 0;">كود التضمين (Embed Code):</p>
                <textarea id="embedCode" rows="4" readonly></textarea>
                <button class="copy-btn" id="copyBtn">نسخ الكود</button>
            </div>
        </div>
    </div>

    <script>
        // الرابط الخاص بسيرفرك على Hugging Face
        const API_URL = "https://khalidwalidabdelnaseer22-khp-backend.hf.space/upload";

        const videoInput = document.getElementById('videoInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileNameDisp = document.getElementById('fileName');
        const progressArea = document.getElementById('progressArea');
        const progressFill = document.getElementById('progressFill');
        const statusText = document.getElementById('statusText');
        const resultArea = document.getElementById('resultArea');
        const embedCode = document.getElementById('embedCode');

        // إظهار اسم الملف المختار
        videoInput.onchange = () => {
            if (videoInput.files[0]) {
                fileNameDisp.innerText = "الملف المختار: " + videoInput.files[0].name;
                fileNameDisp.style.color = "#edbb00";
            }
        };

        uploadBtn.onclick = async () => {
            const file = videoInput.files[0];
            if (!file) {
                alert("يا خالد، اختار فيديو الأول!");
                return;
            }

            // تجهيز الواجهة
            uploadBtn.disabled = true;
            progressArea.style.display = 'block';
            resultArea.style.display = 'none';

            const formData = new FormData();
            formData.append('file', file);

            // محاكاة التحميل
            let progress = 0;
            const timer = setInterval(() => {
                if (progress < 95) {
                    progress += 1;
                    progressFill.style.width = progress + "%";
                    statusText.innerText = `جاري المعالجة والرفع... ${progress}%`;
                }
            }, 800);

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                clearInterval(timer);

                if (response.ok) {
                    progressFill.style.width = "100%";
                    statusText.innerText = "تم الرفع بنجاح!";
                    
                    // توليد كود الـ Embed
                    const code = `<iframe frameborder="0" width="100%" height="400" src="https://www.dailymotion.com/embed/video/${data.video_id}" allowfullscreen allow="autoplay"></iframe>`;
                    embedCode.value = code;
                    resultArea.style.display = 'block';
                } else {
                    throw new Error(data.detail || "خطأ في السيرفر");
                }
            } catch (err) {
                clearInterval(timer);
                alert("حدث خطأ: " + err.message);
                progressArea.style.display = 'none';
            } finally {
                uploadBtn.disabled = false;
            }
        };

        // وظيفة نسخ الكود
        document.getElementById('copyBtn').onclick = () => {
            embedCode.select();
            document.execCommand('copy');
            alert("تم نسخ الكود! ضعه في أي مكان بموقعك.");
        };
    </script>

</body>
</html>
